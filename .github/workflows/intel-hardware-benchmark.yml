name: Intel Hardware Benchmark

# Self-hosted Intel hardware benchmark for OpenVINO VLA IRs.
on:
  workflow_dispatch:
    inputs:
      artifact_dir:
        description: Directory containing OpenVINO XML/BIN artifacts on the runner
        required: false
        default: "C:\\Users\\devcloud\\openVINO-project-21-main\\artifacts\\openvino_ir"
      run_vtune:
        description: Run VTune GPU Hotspots after the benchmark
        required: false
        default: "false"
      vtune_iterations:
        description: Number of profiled workload iterations per VTune run
        required: false
        default: "50"
      force_regenerate_dit:
        description: Regenerate DiT IRs instead of reusing copied artifacts
        required: false
        default: "false"
      vl_seq_len:
        description: VLM sequence length to use for DiT conditioning benchmark
        required: false
        default: "512"
      vl_dim:
        description: VLM hidden size to use for DiT cross-attention benchmark
        required: false
        default: "2048"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/intel-hardware-benchmark.yml"
      - "export_tests/benchmark_fused_vs_single_step_all_devices.py"
      - "export_tests/deep_hardware_benchmark.py"
      - "export_tests/profile_dit_workload.py"
      - "export_tests/openvino_node_profile.py"
      - "export_tests/convert_single_step_dit.py"
      - "export_tests/convert_fused_loop_dit.py"

jobs:
  benchmark:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Python and device inventory
        shell: powershell
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install openvino numpy torch omegaconf diffusers transformers
          python -c "import openvino as ov; print('OpenVINO', ov.__version__); print('devices', ov.Core().available_devices)"
          python scripts/check_openvino_devices.py

      - name: Prepare UnifoLM source
        shell: powershell
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "openvino-vla\unifolm-vla\src\unifolm_vla"
          if (!(Test-Path $src)) {
            Write-Host "UnifoLM source missing from checkout; downloading source archive."
            $target = Join-Path $env:GITHUB_WORKSPACE "openvino-vla\unifolm-vla"
            $zip = Join-Path $env:RUNNER_TEMP "unifolm-vla.zip"
            $extract = Join-Path $env:RUNNER_TEMP "unifolm-vla-src"
            New-Item -ItemType Directory -Force -Path (Split-Path $target) | Out-Null
            Invoke-WebRequest -Uri "https://github.com/unitreerobotics/unifolm-vla/archive/refs/heads/main.zip" -OutFile $zip
            if (Test-Path $extract) { Remove-Item $extract -Recurse -Force }
            Expand-Archive -Path $zip -DestinationPath $extract -Force
            $expanded = Get-ChildItem $extract -Directory | Select-Object -First 1
            if (Test-Path $target) { Remove-Item $target -Recurse -Force }
            Move-Item $expanded.FullName $target
          }
          $patchRoot = Join-Path $env:GITHUB_WORKSPACE "export_tests\vendor_patches\unifolm_vla"
          $sourceRoot = Join-Path $env:GITHUB_WORKSPACE "openvino-vla\unifolm-vla\src\unifolm_vla"
          if (Test-Path $patchRoot) {
            Copy-Item (Join-Path $patchRoot "*") $sourceRoot -Recurse -Force
          }
          Get-ChildItem (Join-Path $env:GITHUB_WORKSPACE "openvino-vla\unifolm-vla\src\unifolm_vla") | Select-Object Name

      - name: Copy or generate IR weights
        shell: powershell
        run: |
          $src = "${{ github.event.inputs.artifact_dir }}"
          if ([string]::IsNullOrWhiteSpace($src)) {
            $src = "C:\Users\devcloud\openVINO-project-21-main\artifacts\openvino_ir"
          }
          $dst = Join-Path $env:GITHUB_WORKSPACE "artifacts\openvino_ir"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Write-Host "Artifact source: $src"
          Write-Host "Artifact destination: $dst"
          if (Test-Path $src) {
            Copy-Item (Join-Path $src "*.bin") $dst -Force -ErrorAction SilentlyContinue
            Copy-Item (Join-Path $src "*.xml") $dst -Force -ErrorAction SilentlyContinue
          }
          if ("${{ github.event.inputs.force_regenerate_dit }}" -eq "true") {
            Write-Host "force_regenerate_dit=true; removing copied DiT IRs before regeneration."
            Remove-Item (Join-Path $dst "single_step_dit.*") -Force -ErrorAction SilentlyContinue
            Remove-Item (Join-Path $dst "fused_loop_dit.*") -Force -ErrorAction SilentlyContinue
          }
          $vlSeqLen = "${{ github.event.inputs.vl_seq_len }}"
          $vlDim = "${{ github.event.inputs.vl_dim }}"
          if ([string]::IsNullOrWhiteSpace($vlSeqLen)) { $vlSeqLen = "512" }
          if ([string]::IsNullOrWhiteSpace($vlDim)) { $vlDim = "2048" }
          Get-ChildItem $dst | Select-Object Name, Length
          if (!(Test-Path (Join-Path $dst "single_step_dit.bin"))) {
            Write-Host "single_step_dit.bin missing; regenerating single-step IR."
            $env:VLA_VL_SEQ_LEN = $vlSeqLen
            $env:VLA_VL_DIM = $vlDim
            python export_tests\convert_single_step_dit.py
          }
          if (!(Test-Path (Join-Path $dst "fused_loop_dit.bin"))) {
            Write-Host "fused_loop_dit.bin missing; regenerating fused-loop IR."
            $env:VLA_VL_SEQ_LEN = $vlSeqLen
            $env:VLA_VL_DIM = $vlDim
            python export_tests\convert_fused_loop_dit.py
          }
          Get-ChildItem $dst | Select-Object Name, Length
          if (!(Test-Path (Join-Path $dst "single_step_dit.bin"))) { throw "Missing single_step_dit.bin after conversion" }
          if (!(Test-Path (Join-Path $dst "fused_loop_dit.bin"))) { throw "Missing fused_loop_dit.bin after conversion" }

      - name: Run multi-device benchmark
        shell: powershell
        run: |
          $vlSeqLen = "${{ github.event.inputs.vl_seq_len }}"
          $vlDim = "${{ github.event.inputs.vl_dim }}"
          if ([string]::IsNullOrWhiteSpace($vlSeqLen)) { $vlSeqLen = "512" }
          if ([string]::IsNullOrWhiteSpace($vlDim)) { $vlDim = "2048" }
          $env:VLA_VL_SEQ_LEN = $vlSeqLen
          $env:VLA_VL_DIM = $vlDim
          python export_tests\benchmark_fused_vs_single_step_all_devices.py

      - name: Run deep hardware benchmark
        shell: powershell
        run: |
          $vlSeqLen = "${{ github.event.inputs.vl_seq_len }}"
          $vlDim = "${{ github.event.inputs.vl_dim }}"
          if ([string]::IsNullOrWhiteSpace($vlSeqLen)) { $vlSeqLen = "512" }
          if ([string]::IsNullOrWhiteSpace($vlDim)) { $vlDim = "2048" }
          $env:VLA_VL_SEQ_LEN = $vlSeqLen
          $env:VLA_VL_DIM = $vlDim
          python export_tests\deep_hardware_benchmark.py
          Get-Content benchmark_outputs\deep_hardware_benchmark.md

      - name: Run OpenVINO node profiling
        continue-on-error: true
        shell: powershell
        run: |
          $vlSeqLen = "${{ github.event.inputs.vl_seq_len }}"
          $vlDim = "${{ github.event.inputs.vl_dim }}"
          if ([string]::IsNullOrWhiteSpace($vlSeqLen)) { $vlSeqLen = "512" }
          if ([string]::IsNullOrWhiteSpace($vlDim)) { $vlDim = "2048" }
          $env:VLA_VL_SEQ_LEN = $vlSeqLen
          $env:VLA_VL_DIM = $vlDim
          python export_tests\openvino_node_profile.py --device GPU --iterations 10

      - name: Check VTune availability
        shell: powershell
        run: |
          Write-Host "run_vtune input: ${{ github.event.inputs.run_vtune }}"
          $candidatePaths = @(
            "C:\Program Files (x86)\Intel\oneAPI\vtune\latest\bin64\vtune.exe",
            "C:\Program Files\Intel\oneAPI\vtune\latest\bin64\vtune.exe"
          )
          $vtune = Get-Command vtune -ErrorAction SilentlyContinue
          $amplxe = Get-Command amplxe-cl -ErrorAction SilentlyContinue
          if ($vtune) {
            Write-Host "vtune found at $($vtune.Source)"
            vtune -version
          } elseif ($candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1) {
            $vtunePath = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
            Write-Host "vtune found at $vtunePath"
            & $vtunePath -version
          } elseif ($amplxe) {
            Write-Host "amplxe-cl found at $($amplxe.Source)"
            amplxe-cl -version
          } else {
            Write-Host "VTune CLI was not found on PATH."
            Write-Host "Set run_vtune=false for benchmark-only runs, or install Intel VTune Profiler on the runner."
          }

      - name: Run VTune GPU Hotspots
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_vtune == 'true' }}
        shell: powershell
        run: |
          $candidatePaths = @(
            "C:\Program Files (x86)\Intel\oneAPI\vtune\latest\bin64\vtune.exe",
            "C:\Program Files\Intel\oneAPI\vtune\latest\bin64\vtune.exe"
          )
          $vtuneCommand = Get-Command vtune -ErrorAction SilentlyContinue
          if ($vtuneCommand) {
            $vtunePath = $vtuneCommand.Source
          } else {
            $vtunePath = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (!$vtunePath) { throw "VTune CLI is not available on PATH or common oneAPI install paths; cannot run GPU Hotspots." }
          Write-Host "Using VTune: $vtunePath"
          & $vtunePath -version

          $iters = "${{ github.event.inputs.vtune_iterations }}"
          if ([string]::IsNullOrWhiteSpace($iters)) { $iters = "50" }

          New-Item -ItemType Directory -Force -Path benchmark_outputs | Out-Null

          & $vtunePath -collect gpu-hotspots `
            -result-dir benchmark_outputs\vtune_gpu_fused `
            -- python export_tests\profile_dit_workload.py --device GPU --mode fused --iterations $iters --warmup 5 --output-json benchmark_outputs\dit_profile_fused.json
          & $vtunePath -report summary `
            -r benchmark_outputs\vtune_gpu_fused `
            -format text `
            -report-output benchmark_outputs\vtune_gpu_fused_summary.txt

          & $vtunePath -collect gpu-hotspots `
            -result-dir benchmark_outputs\vtune_gpu_python_loop `
            -- python export_tests\profile_dit_workload.py --device GPU --mode python_loop --iterations $iters --warmup 5 --output-json benchmark_outputs\dit_profile_python_loop.json
          & $vtunePath -report summary `
            -r benchmark_outputs\vtune_gpu_python_loop `
            -format text `
            -report-output benchmark_outputs\vtune_gpu_python_loop_summary.txt

      - name: Upload benchmark outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: intel-hardware-benchmark
          path: benchmark_outputs/
